version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: latinbrou_db
    restart: always
    environment:
      POSTGRES_USER: latinbrou_user
      POSTGRES_PASSWORD: latinbrou_db_password_2026
      POSTGRES_DB: latinbrou_database
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latinbrou_user -d latinbrou_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: latinbrou_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: latinbrou_minio
    restart: always
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: latinbrou_minio_admin
      MINIO_ROOT_PASSWORD: latinbrou_minio_secret_2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: latinbrou_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://latinbrou_user:latinbrou_db_password_2026@db:5432/latinbrou_database?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: latinbrou_minio_admin
      MINIO_SECRET_KEY: latinbrou_minio_secret_2026
      MINIO_BUCKET_NAME: latinbrou-assets
      JWT_SECRET: latinbrou_jwt_secret_streetwear_2026
      MERCADOPAGO_ACCESS_TOKEN: MP_TEST_ACCESS_TOKEN
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: latinbrou_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: MP_TEST_PUBLIC_KEY
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: latinbrou_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
      - minio

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
